<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Deployment | Reeha Batool</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 90%;
        }

        .hero {
            padding: 4rem 0;
            text-align: center;
            flex-grow: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #a5b4fc; }
        .reg-no { font-size: 1.2rem; color: #818cf8; margin-bottom: 2rem; }
        
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 1rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <strong>Cloud Computing Assignment 4</strong>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="card">
                <h1>Azure Web App Deployment</h1>
                <p class="reg-no">Developed by: <strong>Reeha Batool</strong></p>
                <p>Registration Number: <strong>NUM-BSCS-2023-09</strong></p>
                
                <div class="status-badge">CI/CD Pipeline: Active</div>

                <div class="info-grid">
                    <div class="info-item">
                        <strong>Repository</strong>
                        <p>webapp-ReehaBatool-009</p>
                    </div>
                    <div class="info-item">
                        <strong>Environment</strong>
                        <p>Microsoft Azure</p>
                    </div>
                    <div class="info-item">
                        <strong>University</strong>
                        <p>Namal University</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Reeha Batool | CS-350 Cloud Computing Lab</p>
        </div>
    </footer>
</body>
</html>
