<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Assignment 4 | Reeha Batool</title>
    <style>
        :root {
            --bg: #064e3b; /* Deep Emerald */
            --card: rgba(255, 255, 255, 0.1);
            --accent: #fbbf24; /* Amber Gold */
            --text: #ecfdf5;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #065f46, #022c22);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; }
        .divider { height: 2px; background: var(--accent); width: 60px; margin: 20px auto; }
        
        .info-box { margin: 20px 0; font-size: 1.1rem; }
        .label { opacity: 0.7; font-size: 0.9rem; text-transform: uppercase; display: block; }

        .status-badge {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="main-container">
        <span class="label">Azure Cloud Deployment</span>
        <h1>Assignment 04</h1>
        <div class="divider"></div>

        <div class="info-box">
            <span class="label">Student Name</span>
            <strong>Reeha Batool</strong>
        </div>

        <div class="info-box">
            <span class="label">Registration Number</span>
            <strong>NUM-BSCS-2023-09</strong>
        </div>

        <p class="status-badge">
            Deployment Status: CI/CD Pipeline Verified - April 14, 2026
        </p>

        <footer>
            Namal University | CS-350 Cloud Computing Lab
        </footer>
    </div>
</body>
</html>
